<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador Firma PDC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">

<style>
body{font-family:Nunito,sans-serif;background:#f4f7fb;margin:24px}
.header{background:#082A8A;color:#fff;padding:18px 24px;border-radius:12px;margin-bottom:20px}
.wrapper{display:flex;gap:24px;flex-wrap:wrap}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.left{width:360px}
input{width:100%;padding:10px;margin:6px 0 10px;border:1px solid #ddd;border-radius:8px}
button{padding:12px 16px;border:none;border-radius:8px;background:#082A8A;color:white;font-weight:800;cursor:pointer}
#firma{min-width:535px;height:168px;display:flex;background:#fff;border:1px solid #ddd;width:max-content}
.logo-side{width:217px;height:168px;flex-shrink:0}
.logo-side img{width:100%;height:100%;object-fit:cover}
.info-side{padding:16px 18px;white-space:nowrap;color:#082A8A}
.name{font-size:21px;font-weight:800;line-height:1.05;margin-bottom:6px}
.role{font-size:11px;font-weight:700;margin-bottom:12px}
.cell{font-size:14px;font-weight:800}
.line,.web{font-size:12px}
.web{font-weight:800}
</style>
</head>
<body>
<div class="header">
<h2 style="margin:0">Generador de Firma PDC</h2>
<p style="margin:8px 0 0 0">Llena los campos con tus datos. La firma se actualizará automáticamente y podrás descargarla en formato PNG.</p>
</div>

<div class="card left">
<input id="name" value="Nombre y Apellido">
<input id="role" value="Nombre de tu puesto">
<input id="cell" value="(000) 0000 0000">
<input id="addr1" value="Dirección línea 1">
<input id="addr2" value="Dirección línea 2">
<input id="mail" value="nombre.apellido@grupopdc.com">
<input id="web" value="www.grupopdc.com">
<button onclick="downloadPNG()">Descargar firma PNG</button>
</div>

<script>
const ids=['name','role','cell','addr1','addr2','mail','web'];
function update(){ids.forEach(id=>document.getElementById('v'+id).textContent=document.getElementById(id).value);}
ids.forEach(id=>document.getElementById(id).addEventListener('input',update));
function cleanFilename(t){return t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9 ]/g,"").trim().replace(/\s+/g,"_");}
async function downloadPNG(){
const canvas=await html2canvas(document.getElementById('firma'),{scale:3});
const a=document.createElement('a');
a.download=cleanFilename(document.getElementById('name').value)+'_FirmaPDC.png';
a.href=canvas.toDataURL('image/png');
a.click();
}
update();
</script>
